name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Upload SQLite artifact
        uses: actions/upload-artifact@v4
        with:
          name: compliance-sqlite
          path: dist/compliance.sqlite
          if-no-files-found: error

# NOTE: public-facing evidence is validated structurally here. Internal evidence
# is referenced by code only (released on request), so there is no cross-repo
# checkout step.
