name: pages

# Deploy the browsable matrix site to GitHub Pages → compliance.datasafe.dev.
#
# GO-LIVE PREREQUISITES (do these once, then this workflow publishes):
#   1. Repo Settings → Pages → Source = "GitHub Actions".
#   2. DNS: CNAME compliance.datasafe.dev → healthdatasafe.github.io
#      (the dist/site/CNAME file is generated by `npm run site`).
#   3. New Relic browser monitoring: create the 'hds-prod-compliance-matrix'
#      browser entity and paste its snippet into public/newrelic-snippet.html,
#      then verify end-to-end alerting to tech.newrelic@healthdatasafe.org
#      (HDS non-negotiable monitoring directive) BEFORE treating this as deployed.
#
# Trigger is manual until the above are done; add `push: {branches:[main]}` to
# auto-publish afterwards.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:all
      - run: npm run site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
