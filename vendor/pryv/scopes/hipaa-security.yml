  - ref: 164.308(a)(5)(ii)(C)
    title: Log-in monitoring — Addressable
    text: |
      Implement procedures for monitoring log-in attempts and reporting
      discrepancies.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider]
    derives_from: [iso-27001.A.8.15]
    tests: [AT01, AT02, AT51]
    overview: |
      Login + authentication-
      failure events are captured in the audit log (per `auth.*` API
      method calls). Observability data aggregates rate + anomaly
      signals. The discrepancy-reporting cadence + threshold tuning
      are operator-side procedure.
    detail: |
      **Pryv surfaces the events; operator chooses the lockout
      policy.** Pryv does not in-process rate-limit login attempts
