      lockout sensitivity is workload-specific). Operator pattern:
      `fail2ban` watching the audit log + banning IPs that exceed
      N auth failures in T minutes; reverse-proxy
      `limit_req_zone` for per-IP rate caps on `/auth/login`.

      Full operator-side rate-limiting framing + reference-config
      backlog: `context/rate-limiting-and-dos-protection.md` +
      internal backlog slug `RATE-LIMITING-RECIPES`.

