  - ref: A1.2
    title: A1.2 — Environmental protections, backup, and recovery infrastructure
    text: |
      The entity authorizes, designs, develops or acquires, implements,
      operates, approves, maintains, and monitors environmental
      protections, software, data back-up processes, and recovery
      infrastructure to meet its objectives.
    coverage: facilitated
    pryv_effort_saved: high
