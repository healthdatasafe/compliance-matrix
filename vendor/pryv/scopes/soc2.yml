  # ───────────────────────────────────────────────────────────────
  # C1 — Confidentiality (additional category)
  # ───────────────────────────────────────────────────────────────

  - ref: C1.1
    title: C1.1 — Identification and maintenance of confidential information
    text: |
      The entity identifies and maintains confidential information to
      meet the entity's objectives related to confidentiality.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: primitive
    draft: true
    pryv_primitives: [stream, system-streams, event, permissions, clientData]
    derives_from: [iso-27001.A.5.12, iso-27001.A.8.11]
    planned:
      - kind: feature
        summary: "auth.randomAlias adds username-side pseudonymisation at the access layer, tightening the confidentiality posture"
        proposal: proposals/aliases-as-pseudonymization-primitive.md
        backlog: ALIASES
        tracking_url: https://github.com/pryv/open-pryv.io/issues/38
        impact: medium
      - kind: feature
        summary: "End-to-end (proxy re-encryption / BYOK) keeps confidential content opaque to the operator; the natural future confidentiality primitive"
        proposal: proposals/e2e-encryption.md
        backlog: E2E-ENCRYPTION
        tracking_url: https://github.com/pryv/open-pryv.io/issues/34
        impact: low
    overview: |
      Pryv lets you identify + isolate confidential data by stream
      layout: dedicate subtrees per confidentiality tier and gate each
      with a distinct permission scope, so confidential streams are
      reachable only by credentials granted them. System streams add a
      privileged tier independent of your scheme; clientData / event
      type can carry machine-readable classification labels. Masking is
      by projection (stream + permissions), not value transformation —
      see context/data-masking-projection-vs-transformation.md.

  - ref: C1.2
    title: C1.2 — Disposal of confidential information
    text: |
      The entity disposes of confidential information to meet the
      entity's objectives related to confidentiality.
    coverage: configurable
    pryv_effort_saved: medium
