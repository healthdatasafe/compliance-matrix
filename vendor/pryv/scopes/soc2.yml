id: soc2
title: SOC 2 — AICPA Trust Services Criteria (Security, Availability, Confidentiality, Processing Integrity, Privacy)
short: SOC 2
type: standard
jurisdiction: United States (AICPA)
version: Trust Services Criteria (2017), with revised points of focus (2022)
version_date: "2022-01-01"
canonical_url: https://www.aicpa-cima.com/resources/landing/trust-services-criteria
matrix_language: EN
curated: false

changelog:
  - date: "2026-06-15"
    change: |
      initial draft — full Trust Services Criteria point set. Security
      (Common Criteria CC1-CC9) is mandatory; Availability (A1),
      Confidentiality (C1), Processing Integrity (PI1) and Privacy
      (P1-P8) categories all authored because Pryv implementers
      typically attest against the full TSC scope. The Common Criteria
      map closely onto ISO/IEC 27001 Annex A — coverage prose and
      primitive citations cross-link to the iso-27001 rows via
      derives_from rather than re-deriving. Privacy criteria cross-link
      to gdpr + iso-27701 + hipaa-privacy. SOC 2 is an attestation
      framework, not a regulation: an implementer's report is produced
      by their auditor against controls THEY operate — Pryv supplies the
      technical control substrate + the audit evidence, never the
      management assertion or the control narrative.

requirements:

  # ───────────────────────────────────────────────────────────────
  # CC1 — Control Environment (COSO Principle 1-5)
  # Governance layer: almost entirely the service organization's own
  # management activity. Pryv's role is accountability evidence only.
  # ───────────────────────────────────────────────────────────────

  - ref: CC1.1
    title: CC1.1 — Commitment to integrity and ethical values
    text: |
      The entity demonstrates a commitment to integrity and ethical
      values.
    coverage: out-of-scope
    draft: true
    overview: |
      Integrity + ethics are a management-and-culture matter. Pryv has
      no software role at the values / code-of-conduct layer; your audit
      log can later evidence whether workforce behaviour matched the
      stated values, but the commitment itself is yours to make and
      document.

  - ref: CC1.2
    title: CC1.2 — Board independence and oversight
    text: |
      The board of directors demonstrates independence from management
      and exercises oversight of the development and performance of
      internal control.
    coverage: out-of-scope
    draft: true
    overview: |
      Board governance is organizational. No software contribution; this
      matrix + the audit log feed the oversight pack the board reviews,
      but the oversight function is yours.

  - ref: CC1.3
    title: CC1.3 — Management structures, reporting lines, authorities
    text: |
      Management establishes, with board oversight, structures,
      reporting lines, and appropriate authorities and responsibilities
      in the pursuit of objectives.
    coverage: out-of-scope
    draft: true
    overview: |
      Org structure + authority assignment are management artefacts.
      Pryv enforces the *technical* half of "appropriate authorities"
      once you've decided them (see CC6.3 least-privilege), but the
      reporting-line design itself is yours.

  - ref: CC1.4
    title: CC1.4 — Commitment to competence
    text: |
      The entity demonstrates a commitment to attract, develop, and
      retain competent individuals in alignment with objectives.
    coverage: out-of-scope
    draft: true
    overview: |
      Hiring + training + retention is an HR programme. No software
      role.

  - ref: CC1.5
    title: CC1.5 — Accountability for internal control responsibilities
    text: |
      The entity holds individuals accountable for their internal
      control responsibilities in the pursuit of objectives.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, access]
    derives_from: [iso-27001.A.5.16]
    overview: |
      Pryv gives you the technical accountability substrate: every API
      call is attributable to an access (accessId + accessSerial) in the
      per-user audit log, so "who did what, when" is recoverable when
      you need to hold an individual to account. Defining the
      responsibilities and the consequence process is your management
      activity; Pryv supplies the evidence trail.

  # ───────────────────────────────────────────────────────────────
  # CC2 — Communication and Information (COSO Principle 13-15)
  # ───────────────────────────────────────────────────────────────

  - ref: CC2.1
    title: CC2.1 — Quality information to support internal control
    text: |
      The entity obtains or generates and uses relevant, quality
      information to support the functioning of internal control.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider]
    overview: |
      Pryv produces two streams of control-relevant information: the
      per-user audit log (application-level activity, attributable to an
      access) and observability metrics (operational + security KPIs via
      the pluggable provider). What you monitor and how you act on it is
      your programme; Pryv supplies the quality data.

  - ref: CC2.2
    title: CC2.2 — Internal communication of objectives and responsibilities
    text: |
      The entity internally communicates information, including
      objectives and responsibilities for internal control, necessary
      to support the functioning of internal control.
    coverage: out-of-scope
    draft: true
    overview: |
      Internal communication of objectives is a management activity. No
      software role at the communication-content layer.

  - ref: CC2.3
    title: CC2.3 — External communication on internal control matters
    text: |
      The entity communicates with external parties regarding matters
      affecting the functioning of internal control.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: awareness
    draft: true
    pryv_primitives: [audit]
    derives_from: [iso-27001.A.5.19]
    overview: |
      For the slice of external communication that concerns the Pryv
      platform itself, open-pryv.io's public release process is the
      channel: tagged releases, CHANGELOG-v2 + CHANGELOG-v2-back, and
      (when shipped) the vulnerability-disclosure programme. You layer
      your own customer / subprocessor / auditor communications on top.

  # ───────────────────────────────────────────────────────────────
  # CC3 — Risk Assessment (COSO Principle 6-9)
  # ───────────────────────────────────────────────────────────────

  - ref: CC3.1
    title: CC3.1 — Specifies objectives with sufficient clarity
    text: |
      The entity specifies objectives with sufficient clarity to enable
      the identification and assessment of risks relating to objectives.
    coverage: out-of-scope
    draft: true
    overview: |
      Objective-setting is your management exercise. Pryv has no role in
      authoring objectives; the matrix supports the downstream
      risk-to-control mapping once your objectives exist.

  - ref: CC3.2
    title: CC3.2 — Identifies and analyzes risk
    text: |
      The entity identifies risks to the achievement of its objectives
      across the entity and analyzes risks as a basis for determining
      how the risks should be managed.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [access, permissions, audit, encryption-at-rest-secrets, multi-core-mTLS, backup-restore]
    derives_from: [iso-27001.6.1.2]
    overview: |
      Your risk-assessment methodology and the specific findings are
      yours. Pryv contributes the inventory of technical controls (this
      matrix, particularly the CC6 access + CC6.6/6.7 boundary +
      cryptography rows) — when you identify a confidentiality /
      integrity / availability risk, the matrix surfaces which Pryv
      primitive addresses it, so control applicability is mechanical
      rather than judgemental.

  - ref: CC3.3
    title: CC3.3 — Considers the potential for fraud
    text: |
      The entity considers the potential for fraud in assessing risks
      to the achievement of objectives.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider]
    overview: |
      Pryv's audit log + observability metrics are the detection
      substrate for insider-misuse and anomalous-access fraud scenarios
      (every access is attributable; unusual read/write patterns
      surface). The fraud-risk analysis itself — which scenarios matter,
      what thresholds trigger review — is your assessment.

  - ref: CC3.4
    title: CC3.4 — Identifies and assesses changes affecting internal control
    text: |
      The entity identifies and assesses changes that could
      significantly impact the system of internal control.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit]
    derives_from: [iso-27001.A.8.32]
    overview: |
      For changes to the Pryv platform, open-pryv.io's CHANGELOGs +
      tagged releases announce what changed; the audit log shows when
      config-driven behaviour changed observably in your deployment. The
      change-impact assessment process is yours.

  # ───────────────────────────────────────────────────────────────
  # CC4 — Monitoring Activities (COSO Principle 16-17)
  # ───────────────────────────────────────────────────────────────

  - ref: CC4.1
    title: CC4.1 — Performs ongoing and separate evaluations
    text: |
      The entity selects, develops, and performs ongoing and/or
      separate evaluations to ascertain whether the components of
      internal control are present and functioning.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider]
    derives_from: [iso-27001.A.8.16, iso-27001.9.1]
    overview: |
      Pryv supplies the data an ongoing evaluation samples: the audit
      log evidences control-effectiveness (e.g., that access scoping
      actually blocks out-of-scope reads), observability evidences
      operational health. You define the evaluation cadence and the
      sampling method.

  - ref: CC4.2
    title: CC4.2 — Evaluates and communicates deficiencies
    text: |
      The entity evaluates and communicates internal control
      deficiencies in a timely manner to those parties responsible for
      taking corrective action.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider]
    derives_from: [iso-27001.10.2]
    overview: |
      Pryv-side deficiency signals (audit anomalies, observability
      alerts) feed your deficiency-tracking process. CAPA-style records
      can themselves ride on Pryv events on a dedicated stream. The
      evaluation + communication workflow is your procedure.

  # ───────────────────────────────────────────────────────────────
  # CC5 — Control Activities (COSO Principle 10-12)
  # ───────────────────────────────────────────────────────────────

  - ref: CC5.1
    title: CC5.1 — Selects and develops control activities
    text: |
      The entity selects and develops control activities that
      contribute to the mitigation of risks to the achievement of
      objectives to acceptable levels.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: primitive
    draft: true
    pryv_primitives: [access, permissions, system-streams, encryption-at-rest-secrets]
    derives_from: [iso-27001.A.8.27]
    overview: |
      Several of your control activities ARE Pryv primitives:
      permission-scoped access tokens (purpose limitation), system
      streams (privileged-data isolation), encryption of operator
      secrets at rest. You select which to deploy against which risk;
      Pryv provides the activities ready-made rather than as something
      you build.

  - ref: CC5.2
    title: CC5.2 — General control activities over technology
    text: |
      The entity also selects and develops general control activities
      over technology to support the achievement of objectives.
    coverage: facilitated
    pryv_effort_saved: high
    facilitation_mode: primitive
    draft: true
    pryv_primitives: [access, permissions, audit, letsEncrypt-integration, multi-core-mTLS, encryption-at-rest-secrets]
    derives_from: [iso-27001.A.8.3, iso-27001.A.8.24]
    overview: |
      The technology general controls SOC 2 examines — logical access,
      authentication, encryption in transit + at rest for secrets,
      audit logging, secure inter-core transport — are shipped Pryv
      primitives, enforced at the API surface rather than left to your
      configuration discipline. The CC6 + CC7 rows below detail each.
      Your role is selecting and operating them.

  - ref: CC5.3
    title: CC5.3 — Deploys control activities through policies and procedures
    text: |
      The entity deploys control activities through policies that
      establish what is expected and procedures that put policies into
      action.
    coverage: out-of-scope
    draft: true
    overview: |
      Policy + procedure authoring is your editorial work. Pryv enforces
      what the policies decide (access rules, encryption), but the
      policy text and the operating procedures are yours.

  # ───────────────────────────────────────────────────────────────
  # CC6 — Logical and Physical Access Controls
  # The core Pryv-contribution surface for SOC 2 Security.
  # ───────────────────────────────────────────────────────────────

  - ref: CC6.1
    title: CC6.1 — Logical access security over protected information assets
    text: |
      The entity implements logical access security software,
      infrastructure, and architectures over protected information
      assets to protect them from security events to meet the entity's
      objectives.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, permissions, system-streams, MFA, encryption-at-rest-secrets, letsEncrypt-integration]
    tests: [AA01, AA02, ACCP, MA01, MA02]
    derives_from: [iso-27001.A.5.15, iso-27001.A.8.5, hipaa-security.164.312(a)(1)]
    planned:
      - kind: enhancement
        summary: "Reference TOTP / WebAuthn MFA plugins + AAL-tier mapping strengthen the CC6.1 authentication-strength evidence"
        proposal: proposals/mfa-modern-methods.md
        backlog: MFA-MODERN-METHODS
        tracking_url: https://github.com/pryv/open-pryv.io/issues/78
        impact: medium
    overview: |
      Logical access is enforced by Pryv at the API surface: every
      read/write is checked against the access's per-stream + level
      permissions, token-based authentication is the default, and MFA is
      available via the mfa.* methods when you enable it. System streams
      isolate privileged data (credentials, MFA state). No plaintext
      transport path ships. You define who gets which access; Pryv
      enforces it.

  - ref: CC6.2
    title: CC6.2 — User registration, credential issuance, and de-provisioning
    text: |
      Prior to issuing system credentials and granting system access,
      the entity registers and authorizes new internal and external
      users whose access is administered by the entity. For those users
      whose access is administered by the entity, user system
      credentials are removed when user access is no longer authorized.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, system-streams, audit]
    tests: [AA01, AA02, ACCP, UZEV]
    derives_from: [iso-27001.A.5.16, iso-27001.A.5.18, hipaa-security.164.308(a)(3)(ii)(C)]
    overview: |
      The full credential lifecycle is Pryv primitives: registration
      mints an account; accesses.create issues a scoped credential;
      accesses.update modifies scope (writing the prior version to
      history); accesses.delete revokes; system.users.delete removes the
      account entirely. Each stage lands in the audit log. The
      authorization decision (who may register, what scope is
      appropriate) is your policy; the mechanism is shipped.

  - ref: CC6.3
    title: CC6.3 — Role-based access, least privilege, segregation of duties
    text: |
      The entity authorizes, modifies, or removes access to data,
      software, functions, and other protected information assets based
      on roles, responsibilities, or the system design and changes,
      giving consideration to the concepts of least privilege and
      segregation of duties, to meet the entity's objectives.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, permissions, system-streams, audit]
    tests: [AA01, AA02, ACCP]
    derives_from: [iso-27001.A.5.15, iso-27001.A.5.18, iso-27001.A.5.3]
    overview: |
      Least privilege is native: an access carries only the
      stream+level tuples it needs (none / create-only / read /
      contribute / manage), so a credential cannot touch out-of-scope
      data. Segregation of duties is expressed by issuing distinct
      narrow accesses per role, with system streams isolating privileged
      functions. accesses.update / .delete cover modify + remove; access
      version history is the review-evidence layer. Role definitions
      live in your IdP / policy; Pryv records and enforces the resulting
      access state.
    detail: |
      For workforce / role-scale deployments, Pryv composes with an
      external IdP / IGA system rather than implementing roles + groups
      itself — two integration patterns (group access + callerId audit
      suffix; seed access + sub-access derivation) are documented in
      context/workforce-access-patterns.md. The IdP stays the source of
      truth for identity; Pryv records the access state + per-individual
      audit trail.

  - ref: CC6.4
    title: CC6.4 — Physical access to facilities and protected assets
    text: |
      The entity restricts physical access to facilities and protected
      information assets (for example, data center facilities, back-up
      media storage, and other sensitive locations) to authorized
      personnel to meet the entity's objectives.
    coverage: out-of-scope
    draft: true
    overview: |
      Physical access control (data-center entry, badge systems, media
      vaults) is facility scope, outside Pryv's software boundary. Your
      hosting provider carries this — an HDS- or ISO 27001-certified
      hoster typically inherits it from the underlying CSP and provides
      the attestation you reference.

  - ref: CC6.5
    title: CC6.5 — Logical and physical protections over data destruction
    text: |
      The entity discontinues logical and physical protections over
      physical assets only after the ability to read or recover data
      and software from those assets has been diminished and is no
      longer required to meet the entity's objectives.
    coverage: configurable
    pryv_effort_saved: medium
    draft: true
    pryv_primitives: [event, stream, backup-restore]
    config_keys: [storages.userAccountStorage.engine]
    tests: [USAD]
    derives_from: [iso-27001.A.8.10, gdpr.Art.17, hipaa-security.164.310(d)(1)]
    overview: |
      Logical destruction is per-user: system.users.delete removes the
      user's data from the live store; event- and stream-level deletion
      cover per-record needs. Whether destruction extends to backups is
      engine-dependent — SQLite stores one file per user (unlink =
      gone), PostgreSQL deletes rows but historical pg_dump artefacts
      retain them until rotated. Choose the engine that matches your
      destruction policy; physical media sanitisation is your hosting
      procedure.

  - ref: CC6.6
    title: CC6.6 — Boundary protection against external threats
    text: |
      The entity implements logical access security measures to protect
      against threats from sources outside its system boundaries.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [letsEncrypt-integration, multi-core-mTLS, access]
    tests: [ACMEINT, ACMEORCH, BUNDLEENC]
    derives_from: [iso-27001.A.8.20, hipaa-security.164.312(e)(1)]
    overview: |
      The external boundary is the TLS-terminating HTTPS API: TLS 1.3 in
      transit with the built-in ACME integration (auto-renewal +
      cluster-replicated rotation), token-gated access on every request,
      no plaintext path. Inter-core traffic in a cluster runs over mTLS
      on a private CA, separating the control plane from the user-facing
      plane. Edge controls (WAF, firewall, rate limiting) sit in your
      reverse proxy by design — see context/rate-limiting-and-dos-protection.md.

  - ref: CC6.7
    title: CC6.7 — Restriction and encryption of information in transmission and movement
    text: |
      The entity restricts the transmission, movement, and removal of
      information to authorized internal and external users and
      processes, and protects it during transmission, movement, or
      removal to meet the entity's objectives.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [letsEncrypt-integration, encryption-at-rest-secrets, multi-core-mTLS, access, permissions]
    tests: [ACMEINT, ATRENC, BUNDLEENC]
    derives_from: [iso-27001.A.8.24, hipaa-security.164.312(e)(1), hipaa-security.164.312(e)(2)(ii)]
    overview: |
      Transmission is TLS 1.3 end-to-end (client ↔ core direct, no
      Pryv-shipped intermediary that could log or cache). Movement is
      restricted by the permission model — a credential only moves the
      data its scope permits. Operator secrets at rest use AES-256-GCM
      (HKDF-derived per-key); bootstrap bundles for core-to-core movement
      are AES-256-GCM (scrypt). Bulk event-data at-rest encryption is an
      operator-side storage-layer choice (LUKS / SSE-KMS / customer keys).

  - ref: CC6.8
    title: CC6.8 — Prevention and detection of unauthorized or malicious software
    text: |
      The entity implements controls to prevent or detect and act upon
      the introduction of unauthorized or malicious software to meet
      the entity's objectives.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [observability-provider, audit, data-types]
    derives_from: [iso-27001.A.8.7]
    overview: |
      Anti-malware / endpoint protection is a host-and-network control,
      not shipped in Pryv. Pryv's contribution is detection-adjacent:
      server-side event-type validation rejects malformed payloads at
      ingest, the dependency-audit pipeline guards the software supply
      chain, and audit + observability surface anomalous behaviour. AV +
      application-allowlisting on the hosts is your operator scope.

  # ───────────────────────────────────────────────────────────────
  # CC7 — System Operations
  # ───────────────────────────────────────────────────────────────

  - ref: CC7.1
    title: CC7.1 — Detection of configuration changes and vulnerabilities
    text: |
      To meet its objectives, the entity uses detection and monitoring
      procedures to identify (1) changes to configurations that result
      in the introduction of new vulnerabilities, and (2) susceptibility
      to newly discovered vulnerabilities.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [observability-provider, audit]
    derives_from: [iso-27001.A.8.8, iso-27001.A.8.9]
    planned:
      - kind: feature
        summary: "Supply-chain scanning pipeline (CI npm audit gate + SBOM + image scan + signing) gives CC7.1 a software-side vulnerability-detection feed; shifts F:Evidence Low → F:Evidence Medium"
        proposal: proposals/supply-chain-scanning-pipeline.md
        backlog: SUPPLY-CHAIN-SCANNING-PIPELINE
        tracking_url: https://github.com/pryv/open-pryv.io/issues/81
        impact: medium
    overview: |
      Pryv-side substrate-vulnerability detection today is partial +
      passive: committed package-lock, Dependabot alerts on
      open-pryv.io master, CHANGELOG announcements of relevant fixes,
      and a config-validation step that fails fast on malformed
      configuration at master start. Observability + audit surface
      runtime anomalies. Your own vulnerability-scanning cadence (when
      to upgrade, how to verify) sits on top.

  - ref: CC7.2
    title: CC7.2 — Monitoring for anomalies indicative of security events
    text: |
      The entity monitors system components and the operation of those
      components for anomalies that are indicative of malicious acts,
      natural disasters, and errors affecting the entity's ability to
      meet its objectives; anomalies are analyzed to determine whether
      they represent security events.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [observability-provider, audit, audit-event-stream]
    derives_from: [iso-27001.A.8.16]
    overview: |
      The pluggable observability provider gives system-level anomaly
      signal (latency, error rate, request volume); the per-user audit
      log gives application-level activity, attributable to an access.
      Anomaly-detection logic on the audit stream itself is a natural
      extension you build; the raw signal is shipped.

  - ref: CC7.3
    title: CC7.3 — Evaluation of security events
    text: |
      The entity evaluates security events to determine whether they
      could or have resulted in a failure of the entity to meet its
      objectives (security incidents) and, if so, takes actions to
      prevent or address such failures.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider]
    derives_from: [iso-27001.A.5.25]
    overview: |
      Event-vs-incident classification is your decision. Pryv supplies
      the evaluation inputs — audit row patterns, observability
      anomalies — but the categorisation rule and the response trigger
      are your policy.

  - ref: CC7.4
    title: CC7.4 — Incident response program
    text: |
      The entity responds to identified security incidents by executing
      a defined incident response program to understand, contain,
      remediate, and communicate security incidents, as appropriate.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider, access]
    derives_from: [iso-27001.A.5.24, hipaa-security.164.308(a)(6)(i)]
    planned:
      - kind: feature
        summary: "Chained / signed audit log strengthens forensic evidence during incident analysis (F:Evidence Med → High)"
        proposal: proposals/audit-log-chaining.md
        backlog: AUDIT-LOG-CHAINING
        tracking_url: https://github.com/pryv/open-pryv.io/issues/74
        impact: low
      - kind: enhancement
        summary: "Published vulnerability-disclosure program supplies the external intake channel for substrate-vulnerability reports feeding the incident plan"
        proposal: proposals/vulnerability-disclosure-program.md
        backlog: VULNERABILITY-DISCLOSURE-PROGRAM
        tracking_url: https://github.com/pryv/open-pryv.io/issues/84
        impact: low
    overview: |
      Pryv contributes the technical halves of incident response:
      detection + scoping (audit + observability) and containment
      (accesses.delete revokes a compromised credential immediately).
      The incident-response program itself — roles, escalation,
      communications, lessons-learned — is yours to define and rehearse.

  - ref: CC7.5
    title: CC7.5 — Recovery from identified security incidents
    text: |
      The entity identifies, develops, and implements activities to
      recover from identified security incidents.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [backup-restore, multi-core-mTLS, letsEncrypt-integration]
    derives_from: [iso-27001.A.8.14, hipaa-security.164.308(a)(7)(ii)(B)]
    overview: |
      Recovery primitives: bin/backup.js + --restore rebuild a user from
      backup; a multi-core cluster gives in-line Raft replication +
      cluster-replicated TLS certs so a surviving core keeps serving when
      a peer fails. The recovery-objective targets (RTO / RPO) and the
      drill cadence are your policy.

  # ───────────────────────────────────────────────────────────────
  # CC8 — Change Management
  # ───────────────────────────────────────────────────────────────

  - ref: CC8.1
    title: CC8.1 — Authorized changes to infrastructure, data, software, procedures
    text: |
