        proposal: proposals/breach-scope-tool.md
        backlog: BREACH-SCOPE-TOOL
        tracking_url: https://github.com/pryv/open-pryv.io/issues/76
        impact: high
      - kind: feature
        summary: "Chained audit log raises forensic confidence in the breach-scope determination"
        proposal: proposals/audit-log-chaining.md
        backlog: AUDIT-LOG-CHAINING
        tracking_url: https://github.com/pryv/open-pryv.io/issues/74
        impact: low
    overview: |
      Pryv contributes the scoping evidence a breach notice needs — the
      audit log ties a compromised access to the users + data it
      touched. Today that reverse-index is manual; the breach-scope tool
      proposal automates "which subjects were affected, how many records,
      which streams". Drafting and sending the notifications within the
      regulatory deadline is your process.

  - ref: P6.7
    title: P6.7 — Accounting of disclosures to data subjects
    text: |
      The entity provides data subjects with an accounting of the
      personal information held and disclosure of the data subjects'
      personal information, upon the data subjects' request, to meet the
      entity's objectives related to privacy.
    coverage: implemented
    pryv_effort_saved: medium
    draft: true
    pryv_primitives: [audit, audit-event-stream, access]
    tests: [AT01, AT51, AT61, AT65]
    derives_from: [hipaa-privacy.164.528, gdpr.Art.15]
    overview: |
      The accounting-of-disclosures answer is computable from the audit
      log (which accesses read which data, when) plus the accesses list
      (who holds a grant). The audit-event-stream can expose this to the
      subject directly. Packaging it into a subject-facing report on
      request is your workflow; the underlying record is complete and
      attributable.

  - ref: P7.1
    title: P7.1 — Data quality — accuracy, completeness, relevance
    text: |
      The entity collects and maintains accurate, up-to-date, complete,
      and relevant personal information to meet the entity's objectives
      related to privacy.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: primitive
    draft: true
    pryv_primitives: [data-types, event, access]
    derives_from: [gdpr.Art.5, iso-27701.A.7.4.3]
    overview: |
      Structural data quality is enforced at ingest by event-type schema
      validation (HTTP 400 on malformed input); subjects keep their data
      up-to-date via events.update / account.update (with version
      history). "Relevant" — collecting no more than the purpose needs —
      is bounded by the permission scope you grant. Judging semantic
      accuracy of a specific value is your application's responsibility.

  - ref: P8.1
    title: P8.1 — Privacy complaint management and compliance monitoring
    text: |
      The entity implements a process for receiving, addressing,
      resolving, and communicating the resolution of inquiries,
      complaints, and disputes from data subjects and others and
      periodically monitors compliance to meet the entity's objectives
      related to privacy. Corrections and other necessary actions
      related to identified deficiencies are made or taken in a timely
      manner.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider, event]
    derives_from: [gdpr.Art.12, iso-27701.A.7.3.1]
    overview: |
      The complaint-handling workflow is yours, but Pryv supplies the
      monitoring evidence (audit + observability) and can host the
      complaint / resolution records themselves as events on a dedicated
      stream with an attributable trail. This compliance matrix doubles
      as the periodic control-inventory you monitor against.
