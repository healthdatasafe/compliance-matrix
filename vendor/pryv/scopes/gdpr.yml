      - kind: enhancement
        summary: "Published vulnerability disclosure program (security mailbox + PGP + GHSA + scope + SLA + safe harbor) strengthens §1(d) testing/effectiveness evidence; modernises today's bare SECURITY.md"
        proposal: proposals/vulnerability-disclosure-program.md
