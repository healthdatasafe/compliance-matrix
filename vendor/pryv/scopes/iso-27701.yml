id: iso-27701
title: ISO/IEC 27701 — Extension to ISO/IEC 27001 for Privacy Information Management
short: ISO 27701
type: standard
jurisdiction: International (ISO/IEC)
version: ISO/IEC 27701:2019
version_date: "2019-08-01"
canonical_url: https://www.iso.org/standard/71670
matrix_language: EN
curated: false
layered_on: [iso-27001]

changelog:
  - date: "2026-05-19"
    change: |
      initial draft — 9 rows focused on Annex A (PII controller
      controls) and Annex B (PII processor controls) where Pryv-the-
      software contributes. 27701 cannot be certified standalone —
      requires a 27001 ISMS first (layered_on: [iso-27001]). Source
      text paywalled; maps by clause ID + paraphrase.

requirements:

  - ref: "5"
    title: Clause 5 — PIMS-specific requirements extending ISO 27001
    text: |
      Organization shall apply the requirements of ISO/IEC 27001
      treating privacy as an information-security concern; PII
      controllers and processors apply Annex A and/or B respectively.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: awareness
    draft: true
    pryv_primitives: [access, audit]
    derives_from: [iso-27001.6.1.2]
    overview: |
      27701 extends the 27001
      ISMS to cover PII handling specifically. Pryv contribution is
      the same primitive set surfaced in the iso-27001 rows + the
      GDPR rows; 27701 simply combines them under the privacy-
      information-management label. The organization's PIMS-specific
      risk treatment and statement of applicability sit on top.

  # ───────────────────────────────────────────────────────────────
  # Annex A — PII controller controls (selected)
  # ───────────────────────────────────────────────────────────────

  - ref: A.7.2.1
    title: A.7.2.1 — Identify and document purpose
    text: |
      Organization shall identify and document the specific purposes
      for which PII will be processed.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: storage
    draft: true
    pryv_primitives: [access, clientData]
    derives_from: [gdpr.Art.5]
    overview: |
      Pryv pattern:
      `access.clientData.purpose` records the per-access purpose at
      grant time, durable + auditable. The vocabulary of purposes
      (the organization's documented PIMS catalogue) is the operator's
      editorial work; Pryv carries each instance forward.

  - ref: A.7.2.2
    title: A.7.2.2 — Identify lawful basis
    text: |
      Organization shall determine, document, and comply with the
      relevant lawful basis for processing of PII.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: storage
    draft: true
    pryv_primitives: [access, clientData]
    derives_from: [gdpr.Art.6, gdpr.Art.9]
    overview: |
      `access.clientData.lawful_basis`
      records the determined basis (consent, contract, legal
      obligation, etc.); for special-category PII,
      `clientData.special_category_basis` records the GDPR Art. 9
      paragraph or equivalent. Both travel with the access into the
      audit chain.

  - ref: A.7.3.1
    title: A.7.3.1 — Determining and fulfilling obligations to PII principals
    text: |
      Organization shall determine and document its legal, regulatory,
      and business obligations to PII principals related to the
      processing of their PII.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, stream, event, audit, data-types]
    derives_from: [gdpr.Art.12, gdpr.Art.15]
    functional_specs: [EVENT.BASE, STREAM.BASE]
    tests: [AA01, EGSQ, U9HQ]
    overview: |
      Pryv ships the technical fulfilment of the PII-principal-rights
      obligations: the subject (PII principal) holding a personal
      token reads everything via the standard API. The organization's
      response procedure (timeline, identity verification, content of
      response) is the policy half; Pryv responds in milliseconds.

  - ref: A.7.3.4
    title: A.7.3.4 — Providing mechanism to modify or withdraw consent
    text: |
      Organization shall provide a mechanism for PII principals to
      modify or withdraw their consent.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, permissions, CMC]
    derives_from: [gdpr.Art.7]
    tests: [AA02, ACCP]
    overview: |
      Withdrawal = `accesses.delete`; modification = `accesses.update`
      with new permissions / clientData. Both are versioned and
      auditable; the prior consent state is preserved for §7
      demonstrability. Cross-account (CMC) consent withdrawal uses
      `consent/revoke-cmc` for symmetric teardown.

  - ref: A.7.4.1
    title: A.7.4.1 — Limit collection
    text: |
      Organization shall limit the collection of PII to the minimum
      relevant, proportionate and necessary for the identified
      purposes.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, permissions, stream]
    derives_from: [gdpr.Art.5]
    tests: [AA01, ACCP]
    overview: |
      Per-stream permissions are the technical minimisation control;
      stream topology design determines the granularity. The operator's
      decision of which streams a given app's access should touch IS
      the limit-collection enforcement, expressed in `permissions[]`.

  - ref: A.7.4.7
    title: A.7.4.7 — Records of PII processing
    text: |
      Organization shall determine and securely maintain the necessary
      records in support of its obligations for the processing of PII.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, clientData, audit, CMC, data-residency]
    derives_from: [gdpr.Art.30]
    docs: [customer-resources/audit-setup.md, guides/audit-logs.md]
    tests: [U9HQ, QXCH, AA01]
    overview: |
      Same artefact set as GDPR Art. 30: access + clientData + audit +
      CMC + data-residency primitives constitute the records-of-
      processing register (purpose, basis, recipients, transfers,
      retention, security). Derivable per PII-principal per time
      window.

  # ───────────────────────────────────────────────────────────────
  # Annex B — PII processor controls (selected)
  # ───────────────────────────────────────────────────────────────

  - ref: B.8.4.1
    title: B.8.4.1 — Confidentiality
    text: |
      Persons under the processor's authority who have access to PII
      shall be subject to a confidentiality commitment.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [access, permissions, audit]
    overview: |
      The confidentiality commitment
      is an organizational artefact (employment agreements, contractor
      NDAs). Pryv's contribution: the audit log gives per-person
      accountability so the commitment is enforceable in practice
      (any breach is attributable to an access tied to a person).

  - ref: B.8.5.4
    title: B.8.5.4 — Records related to processing PII
    text: |
      Processor shall determine and maintain necessary records related
      to the processing of PII to support compliance with applicable
      obligations.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [audit, access]
    derives_from: [iso-27701.A.7.4.7]
    tests: [AT01, AT51, AT61]
    overview: |
      When Pryv operates as processor (i.e., when the implementer is
      the controller and the Pryv operator is distinct), the same
      audit chain documented under iso-27001 A.8.15 + iso-27701 A.7.4.7
      satisfies the processor-side records-of-processing requirement.
      The processor's specific obligations (subprocessor list, transfer
      register) are operator-side artefacts.

  - ref: A.7.4.2
    title: A.7.4.2 — Limit processing
    text: |
      Organization shall limit the processing of PII to that which is
      adequate, relevant and necessary for the identified purposes.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, permissions, stream]
    derives_from: [iso-27701.A.7.4.1, gdpr.Art.5]
    tests: [AA01, ACCP]
    overview: |
      Same primitive as A.7.4.1 limit collection — per-stream
      permissions are the technical limit on what processing each
      access can perform. The "adequate / relevant / necessary"
      assessment per purpose is the controller's; the technical
      enforcement is permission-shaped.

  - ref: A.7.4.3
    title: A.7.4.3 — Accuracy and quality
    text: |
      Organization shall ensure and document that PII is as accurate,
      complete and up-to-date as is necessary for the purposes for
      which it is processed throughout the lifecycle of the PII.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [event]
    derives_from: [gdpr.Art.5, gdpr.Art.16]
    tests: [PTU1]
    overview: |
      `events.update` rectifies events with version-history preservation
      (matching GDPR Art.16 mechanics). For "throughout the lifecycle"
      proof, the event version chain is the artefact. The accuracy
      determination + correction workflow is the controller's.

  - ref: A.7.4.5
    title: A.7.4.5 — PII de-identification and deletion at end of processing
    text: |
      Organization shall either delete PII or render it in a form which
      does not permit identification or re-identification of PII
      principals, as soon as the original PII is no longer necessary
      for the identified purpose(s).
    coverage: configurable
    pryv_effort_saved: medium
    draft: true
    pryv_primitives: [event, stream, backup-restore]
    derives_from: [gdpr.Art.17, hipaa-security.164.310, ccpa.1798.105]
    config_keys: [storages.userAccountStorage.engine, user-account.delete]
    tests: [USAD]
    planned:
      - kind: feature
        summary: "auth.randomAlias supplies a de-identification primitive alongside the deletion path"
        proposal: proposals/aliases-as-pseudonymization-primitive.md
        backlog: ALIASES
        tracking_url: https://github.com/pryv/open-pryv.io/issues/38
        impact: low
    overview: |
      Per-user deletion via `system.users.delete` (engine-dependent
      backup behaviour — same notes as GDPR Art. 17). Per-event /
      per-stream deletion lives alongside for partial-deletion needs.
      De-identification (Safe Harbor / Expert Determination methods) is
      an application-layer transformation; Pryv stores the result.
      "**Soon as the original PII is no longer necessary**" is the
      operator's scheduled-retention obligation — Pryv ships no
      TTL primitive; the operator composes `events.get toTime=` +
      `events.delete` + audit-log inactivity oracle in an external
      retention job (`context/data-retention-operator-owned.md`).
      `auth.randomAlias` (backlog `ALIASES`) is the planned
      anonymisation companion for "render in a non-identifying
      form" rather than "delete".

  - ref: A.7.4.6
    title: A.7.4.6 — Temporary files
    text: |
      Organization shall ensure that temporary files created as a
      result of processing of PII are disposed of (e.g., erased,
      destroyed) following documented procedures within a specified,
      documented period.
    coverage: out-of-scope
    draft: true
    overview: |
      Temporary-file handling is an operating-system / runtime concern.
      Pryv-the-software doesn't write PII to ad-hoc temp files; the
      operator's host hygiene (tmpfs, /tmp cleanup, log rotation)
      addresses any temp-file footprints the runtime produces.

  - ref: A.7.4.9
    title: A.7.4.9 — Records of transfer of PII
    text: |
      Organization shall record transfers of PII to or from third
      parties and ensure cooperation with those parties to support
      future requests related to obligations to PII principals.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, clientData, audit, CMC]
    derives_from: [gdpr.Art.30, gdpr.Art.44, hipaa-privacy.164.528]
    tests: [AT01, AT51, AT61]
    overview: |
      Cross-party PII transfers in Pryv go through accesses (typically
      CMC capability accesses or shared accesses). Each access's
      `clientData` records recipient + purpose + legal basis at grant
      time; audit log captures each transfer event with timestamp.
      Together they constitute the §164.528-style accounting record
      for transfers specifically.

  - ref: A.7.5.1
    title: A.7.5.1 — Identify basis for PII transfer between jurisdictions
    text: |
      Organization shall identify and document the relevant basis for
      transfers of PII between jurisdictions.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [data-residency, access, clientData]
    derives_from: [gdpr.Art.44, gdpr.Art.46, gdpr.Art.49]
    overview: |
      Per GDPR Art. 44 /
      Swiss nLPD Art. 34 mapping — the data-residency primitive
      constrains where data lives; cross-jurisdictional transfers
      record the legal basis on the transferring access's
      `clientData.transfer_basis`. The jurisdiction-mapping
      documentation (which jurisdictions appear in your deployment,
      which transfer regime applies to each pair) is operator-side.

  - ref: A.7.5.2
    title: A.7.5.2 — Countries and international organizations to which PII can be transferred
    text: |
      Organization shall specify and document the countries and
      international organizations to which PII can possibly be
      transferred.
    coverage: configurable
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [data-residency, CMC]
    config_keys: [auth.hostings]
    tests: [REGC, RC01, RC03]
    overview: |
      `auth.hostings` declares the hostings (and thus countries /
      jurisdictions) where subjects' data may live; for CMC
      cross-platform sharing, the catalogue of trusted peer
      deployments + their hostings is operator-managed. The
      Statement-of-Applicability entry for A.7.5.2 cites the
      `auth.hostings` config as the technical artefact.

  - ref: B.8.5.6
    title: B.8.5.6 — Disclosure of subcontractors used to process PII
    text: |
      Processor shall disclose to the customer in advance the use of
      subcontractors before such subcontractors process PII; processor
      shall publicly publish a list of subcontractors, or make it
      available on request.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: awareness
    draft: true
    pryv_primitives: [observability-provider]
    derives_from: [gdpr.Art.28]
    overview: |
      Pryv-the-software has one
      optional subprocessor surface — the observability provider (New
      Relic adapter; default disabled). The operator's subcontractor
      list typically includes: hosting provider, observability
      provider when enabled, any backup-storage provider used by
      `bin/backup.js` outputs. The operator publishes the list per
      their B.8.5.6 commitment.

  - ref: A.7.2.3
    title: A.7.2.3 — Determine when and how notice should be provided
    text: |
      Organization shall determine when and how notice shall be
      provided to PII principals concerning processing of their PII.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: storage
    draft: true
    pryv_primitives: [access, clientData, app-web-auth3]
    derives_from: [iso-27701.A.7.3.4, gdpr.Art.12, gdpr.Art.13]
    overview: |
      Notice timing + form are
      editorial. Pryv preserves whatever notice is shown (in
      `access.clientData.privacy_notice` or dedicated
      `consent/notice-*` event) so the same content is auditable per
      principal per time.

  - ref: A.7.2.4
    title: A.7.2.4 — Obtain and record consent
    text: |
      Organization shall obtain and record consent from PII principals
      according to the documented processes.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, permissions, clientData, CMC, event]
    derives_from: [gdpr.Art.7, iso-27701.A.7.3.4]
    tests: [AA01, ACCP]
    overview: |
      Consent recording = `accesses.create` with permissions +
      clientData carrying the consent text; cross-account consent =
      `consent/request-cmc` events. Both are immutable per their
      primitive semantics — the §7 demonstrability requirement is
      structural.

  - ref: A.7.2.5
    title: A.7.2.5 — Privacy impact assessment
    text: |
      Organization shall assess the need for + implement a privacy
      impact assessment whenever new processing of PII or changes to
      existing processing are planned.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, data-residency, access]
    derives_from: [gdpr.Art.35, swiss-nlpd.Art.22]
    overview: |
      PIA / DPIA is a written
      assessment artefact. Pryv contributes the inputs (audit +
      access primitives describe the processing flow; data-residency
      primitive describes where data lives). Cross-link to gdpr.Art.35
      + swiss-nlpd.Art.22 for the regulator-specific DPIA mappings.

  - ref: A.7.2.6
    title: A.7.2.6 — Contracts with PII processors
    text: |
      Organization shall have a written contract with any PII processor
      that it uses, requiring the processor to implement appropriate
      controls.
    coverage: out-of-scope
    draft: true
    derives_from: [gdpr.Art.28]
    overview: |
      Contracts are out-of-scope; see GDPR Art. 28 + HIPAA-Security
      §164.314(a)(1).

  - ref: A.7.2.7
    title: A.7.2.7 — Joint PII controller
    text: |
      Organization shall determine respective roles + responsibilities
      where it acts jointly with one or more PII controllers.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: storage
    draft: true
    pryv_primitives: [access, clientData, CMC]
    overview: |
      Joint-controller arrangements
      (per GDPR Art. 26) get recorded on the relevant access's
      `clientData.joint_controller_arrangement` with a pointer to the
      written agreement. CMC's cross-platform access pattern is the
      natural technical substrate for joint arrangements where each
      controller runs their own Pryv deployment.

  - ref: B.8.2.1
    title: B.8.2.1 — Customer agreement
    text: |
      Customer agreement between processor and PII controller shall
      address the processor's processing of PII consistent with
      ISO/IEC 27018:2019 + applicable laws / regulations.
    coverage: out-of-scope
    draft: true
    derives_from: [gdpr.Art.28]
    overview: |
      Customer agreement = the DPA. Contractual, no software role.

  - ref: B.8.3.1
    title: B.8.3.1 — Obligations to PII principals
    text: |
      Processor shall provide the customer (PII controller) with the
      means to comply with its obligations to PII principals (right of
      access, rectification, erasure, etc.).
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, event, stream, audit, data-types]
    derives_from: [iso-27701.A.7.3.1, gdpr.Art.15, gdpr.Art.16, gdpr.Art.17, gdpr.Art.20]
    tests: [AA01, EGSQ, U9HQ, PTU1, USAD]
    overview: |
      The standard Pryv API (events.get / events.update / streams.get
      / accesses.get / system.users.delete) gives the customer the
      means to fulfill each principal-rights obligation directly.
      The controller wraps these in their subject-portal; the
      processor (Pryv operator) doesn't intermediate.

  - ref: B.8.4
    title: B.8.4 — Privacy by design and by default
    text: |
      Processor shall ensure privacy + data-protection design + default
      principles are implemented in processing of PII.
    coverage: facilitated
    pryv_effort_saved: high
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [access, permissions, stream, system-streams]
    derives_from: [gdpr.Art.25, swiss-nlpd.Art.7]
    overview: |
      Pryv's architecture
      leans privacy-by-design (per-user isolation, least-privilege
      permissions, system-streams separation, audit by default). The
      processor inheriting these defaults satisfies B.8.4
      structurally. See gdpr.Art.25 for the cross-link to the
      detailed primitive mapping.

  - ref: B.8.5.2
    title: B.8.5.2 — Records of PII disclosures to third parties
    text: |
      Processor shall record disclosures of PII to third parties,
      including what PII has been disclosed, to whom, and at what time.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [audit, access, clientData, CMC]
    derives_from: [iso-27701.A.7.4.9, hipaa-privacy.164.528, gdpr.Art.30]
    tests: [AT01, AT51, AT61]
    overview: |
      When the processor (Pryv operator) executes a third-party
      disclosure (e.g., a CMC cross-platform share, a shared access
      to a counterparty), the audit log records the API call with
      access reference; the access's `clientData.recipient` +
      `clientData.purpose` capture the "to whom" + "for what" fields.
      Together they constitute B.8.5.2-compliant records.
