  - ref: A.8.14
    title: A.8.14 — Redundancy of information processing facilities
    text: |
      Information processing facilities shall be implemented with
      redundancy sufficient to meet availability requirements.
    coverage: facilitated
    pryv_effort_saved: high
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [multi-core-mTLS, backup-restore, letsEncrypt-integration]
    derives_from: [iso-27001.A.5.23, hipaa-security.164.308(a)(7)(ii)(B)]
    overview: |
      Multi-core HA + Raft
      replication give in-line redundancy; backup-restore + cluster-
      replicated TLS certs let a surviving core continue user-facing
      operation when a peer fails. The availability target +
      redundancy depth (cores per region) is operator policy.

  - ref: A.8.17
    title: A.8.17 — Clock synchronization
    text: |
      Clocks of information processing systems used by the organization
      shall be synchronized to approved time sources.
    coverage: out-of-scope
    draft: true
    planned:
      - kind: feature
        summary: "Bootstrap-join + pre-cert-load clock-skew detection (would shift row to F:Awareness|Low)"
        proposal: proposals/clock-skew-cluster-checks.md
        backlog: CLOCK-SKEW-CLUSTER-CHECKS
        tracking_url: https://github.com/pryv/open-pryv.io/issues/77
        impact: medium
    overview: |
      Clock sync is the host-OS concern (chronyd / ntpd); Pryv stores
      whatever timestamp the host produces. The operator ensures every
      host in the cluster runs a synchronized clock service.
    detail: |
      Pryv's architecture is **core-affine** — every user's data
      operations resolve to one core (see
      `context/core-affinity-architecture.md`). Cores never need to
      agree on clock value or on cert validity with each other; the
      dangerous failure modes are all intra-core (one core's own
      clock vs its own loaded cert / its own audit-row timestamps).

      **Pryv's existing contribution to skew detection**: every API
      response carries `meta.serverTime` (Unix timestamp seconds;
      `components/api-server/src/methods/helpers/setCommonMeta.ts`).
      Webhook payloads include the same. Clients use this to detect
      their own clock skew vs the server. Server-to-server skew
      detection is not currently shipped — operators rely on host
      NTP for that.

      **Planned addition** (see
      `proposals/clock-skew-cluster-checks.md`): two intra-core
      checkpoints — bootstrap-join skew check (refuse to ack when
      the joining core's clock differs from the issuer's
      `serverTime` by more than `cluster.clockSkewThresholdSec`)
      + pre-cert-load validity check (refuse to swap a rotated
      cert whose `notBefore..notAfter` window doesn't contain the
      local clock). After these ship the row moves from
      `out-of-scope` to `F: Awareness | Low`.

  - ref: A.8.18
    title: A.8.18 — Use of privileged utility programs
    text: |
      The use of utility programs that can be capable of overriding
      system and application controls shall be restricted and tightly
      controlled.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: primitive
    draft: true
    pryv_primitives: [system-streams, access, audit]
    derives_from: [iso-27001.A.8.2, hipaa-security.164.312(a)(2)(ii)]
    overview: |
      Pryv-side privileged
      utilities: the `bin/*` CLIs (`bootstrap.js`, `migrate.js`,
      `dns-records.js`, `observability.js`, `backup.js`). Operator
      restricts their execution to administrator accounts via host-OS
      permissions + sudo policy. The `auth.adminAccessKey`-bearing
      API surface is the runtime privilege channel; usage is
      audit-logged.

  - ref: A.8.19
    title: A.8.19 — Installation of software on operational systems
    text: |
      Procedures and measures shall be implemented to securely manage
      software installation on operational systems.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [audit]
    overview: |
      Pryv ships as a single
      Docker image with SHA-pinned tag; the installation channel is
      reproducible. Operator's installation procedure (build
      verification, signature checking, change-approval gate) sits
      on top.

  - ref: A.8.21
    title: A.8.21 — Security of network services
    text: |
      Security mechanisms, service levels and service requirements of
      network services shall be identified, implemented and monitored.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [letsEncrypt-integration, multi-core-mTLS, observability-provider]
    derives_from: [iso-27001.A.8.20]
    overview: |
      Pryv's external
      network surface is the TLS-terminating HTTPS API + the embedded
      DNS server (when multi-core enabled); both are monitored via
      observability. Inter-core mTLS is the internal surface. The
      operator's broader network-service portfolio (LB, WAF, VPN)
      sits outside Pryv.
    detail: |
      **Rate limiting / DoS protection is deliberately operator-side**
      (reverse proxy / WAF / API gateway). In-process throttling
      inside Pryv was considered + rejected because (1) multi-core
      load distribution makes per-core counters mis-fire and
      (2) abuse signatures are operator-specific. Pryv contributes
      the **detection layer** (audit log + observability metrics +
      `accesses.delete` revocation); enforcement happens at the edge.
      Full rationale + operator mitigation patterns + reference-
      config backlog: `context/rate-limiting-and-dos-protection.md`
      + internal backlog slug `RATE-LIMITING-RECIPES`.

  - ref: A.8.26
    title: A.8.26 — Application security requirements
