  # ─── Clauses 5-10 framing rows ───

  - ref: "5"
    title: Clause 5 — Leadership
    text: |
      Top management shall demonstrate leadership and commitment with
      respect to the ISMS by ensuring policy + objectives are
      established, integration of ISMS requirements into the
      organization's processes, availability of resources, ownership
      of communications, and oversight of management review.
    coverage: out-of-scope
    draft: true
    overview: |
