id: iso-27001
title: ISO/IEC 27001 — Information Security Management Systems — Requirements
short: ISO 27001
type: standard
jurisdiction: International (ISO/IEC)
version: ISO/IEC 27001:2022
version_date: "2022-10-25"
canonical_url: https://www.iso.org/standard/27001
matrix_language: EN
curated: false

changelog:
  - date: "2026-05-19"
    change: |
      initial draft — 16 rows focused on Annex A technological controls
      where Pryv-the-software contributes directly. Clauses 4-10
      (organizational ISMS requirements) are largely QMS-side and stay
      as framing rows. Source text is paywalled — references map by
      clause + control ID only; requirement text is paraphrased.

requirements:

  # ───────────────────────────────────────────────────────────────
  # Clauses 4-10 — ISMS programmatic requirements (mostly QMS-side)
  # ───────────────────────────────────────────────────────────────

  - ref: "4"
    title: Clause 4 — Context of the organization
    text: |
      Organization shall determine external and internal issues relevant
      to its purpose that affect its ability to achieve the intended
      outcomes of the ISMS, and shall determine interested parties +
      requirements + scope.
    coverage: out-of-scope
    draft: true
    overview: |
      Clause 4 is the organization's strategic ISMS-scoping exercise.
      Pryv has no software role at this layer — when an organization
      adopts Pryv, the matrix supports their Clause-6 risk assessment
      by enumerating Pryv-side controls explicitly, but Clause 4 itself
      sits at the operator/implementer level.

  - ref: "6.1.2"
    title: Clause 6.1.2 — Information security risk assessment
    text: |
      Organization shall define and apply an information security risk
      assessment process that establishes and maintains criteria for
      risk acceptance, identifies risks associated with the loss of
      confidentiality, integrity and availability.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [access, permissions, audit, encryption-at-rest-secrets, multi-core-mTLS, letsEncrypt-integration, backup-restore]
    overview: |
      The risk-assessment
      methodology + the operator's specific findings are the
      operator's artefact. Pryv contributes the inventory of
      technical controls (this matrix, particularly Annex A.8 rows
      below) — when the operator identifies a CIA risk, the matrix
      surfaces which Pryv primitive addresses it (or does not), so
      Annex A applicability is mechanical rather than judgemental.

  # ───────────────────────────────────────────────────────────────
  # Annex A.5 — Organizational controls (selected)
  # ───────────────────────────────────────────────────────────────

  - ref: A.5.15
    title: A.5.15 — Access control
    text: |
      Rules to control physical and logical access to information and
      other associated assets shall be established and implemented based
      on business and information security requirements.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, permissions, system-streams]
    tests: [AA01, AA02, ACCP]
    overview: |
      Logical access control is enforced at the API surface by the
      access + permissions primitives — every read/write request is
      checked against the access's stream + level permissions. The
      operator's access-control rule definition (who gets what) is
      the policy half; technical enforcement is Pryv-side.

  - ref: A.5.34
    title: A.5.34 — Privacy and protection of personal information
    text: |
      Privacy and protection of personally identifiable information
      shall be identified, documented and implemented in accordance
      with applicable laws and contractual requirements.
    coverage: facilitated
    pryv_effort_saved: high
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [access, permissions, clientData, audit, system-streams]
    derives_from: [gdpr.Art.25, gdpr.Art.32]
    overview: |
      Pryv's primitive set
      carries privacy-by-design (see GDPR Art. 25) and the technical
      security controls (see GDPR Art. 32). What's on the operator's
      side: the identification of which laws apply, the documented
      privacy commitments (notice texts, consent UX), and the
      contractual side. Cross-scope link to the gdpr.* rows for the
      detailed mapping.

  # ───────────────────────────────────────────────────────────────
  # Annex A.6 — People controls (selected)
  # ───────────────────────────────────────────────────────────────

  - ref: A.6.7
    title: A.6.7 — Remote working
    text: |
      Security measures shall be implemented when personnel are working
      remotely to protect information accessed, processed or stored
      outside the organization's premises.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [letsEncrypt-integration, MFA, access]
    overview: |
      Pryv's API is remote-
      by-design — workforce access from off-premises traverses the
      same TLS + access-token + MFA controls as any other access.
      The operator's remote-working policy (devices, VPN, endpoint
      hardening) sits on top of this; Pryv provides the secure
      transport + auth substrate.

  # ───────────────────────────────────────────────────────────────
  # Annex A.8 — Technological controls (the Pryv-contribution surface)
  # ───────────────────────────────────────────────────────────────

  - ref: A.8.2
    title: A.8.2 — Privileged access rights
    text: |
      Allocation and use of privileged access rights shall be restricted
      and managed.
    coverage: configurable
    pryv_effort_saved: medium
    draft: true
    pryv_primitives: [access, system-streams]
    config_keys: [auth.adminAccessKey]
    tests: [LG20, GF33]
    overview: |
      Pryv's privileged-access surface is small and explicit: the
      operator's `auth.adminAccessKey` is the root credential; system
      streams (account, password, mfa) require an explicit grant in
      `permissions[]`. Both surfaces are auditable. The operator's
      custody process for the admin key is the policy-side control.

  - ref: A.8.3
    title: A.8.3 — Information access restriction
    text: |
      Access to information and other associated assets shall be
      restricted in accordance with the established topic-specific
      policy on access control.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, permissions, stream]
    tests: [AA01, AA02, ACCP]
    overview: |
      Per-stream permissions are the technical access-restriction
      primitive. Stream design (which data lives where) is the
      implementer's choice; permission scoping per access is
      operationally enforced at every API call.

  - ref: A.8.5
    title: A.8.5 — Secure authentication
    text: |
      Secure authentication technologies and procedures shall be
      implemented based on information access restrictions and the
      topic-specific policy on access control.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, MFA, system-streams]
    config_keys: [services.mfa.mode]
    tests: [MA01, MA02, MA03, MA04, MA05]
    planned:
      - kind: enhancement
        summary: "Reference TOTP / WebAuthn plugins + AAL-tier mapping doc strengthen the A.8.5 evidence chain"
        proposal: proposals/mfa-modern-methods.md
        backlog: MFA-MODERN-METHODS
        tracking_url: https://github.com/pryv/open-pryv.io/issues/78
        impact: medium
    overview: |
      Token-based auth by default; multi-factor via `mfa.*` API methods
      when `services.mfa.mode` is enabled. The MFA test series
      (MA01-MA09) exercises activate / confirm / challenge / verify /
      deactivate / recover. Authentication strength tier is the
      operator's policy choice; technical primitives are shipped.

  - ref: A.8.10
    title: A.8.10 — Information deletion
    text: |
      Information stored in information systems, devices or in any
      other storage media shall be deleted when no longer required.
    coverage: configurable
    pryv_effort_saved: medium
    draft: true
    pryv_primitives: [event, stream, backup-restore]
    config_keys: [storages.userAccountStorage.engine, user-account.delete]
    tests: [USAD]
    overview: |
      Per-user erasure: `system.users.delete` removes the user's data
      from the live store. Engine-dependent backup behaviour (SQLite
      per-user file vs PG row deletion + backup rotation)
      determines whether erasure extends to backups — same notes as
      GDPR Art. 17 + HIPAA-Security §164.310(d) media-controls. Event-
      level and stream-level deletion live alongside for per-record
      deletion needs.

  - ref: A.8.13
    title: A.8.13 — Information backup
    text: |
      Backup copies of information, software and systems shall be
      maintained and regularly tested in accordance with the agreed
      topic-specific policy on backup.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [backup-restore, multi-core-mTLS]
    overview: |
      `bin/backup.js`
      produces per-user backup files; multi-core cluster topology
      gives in-line replication (rqlite Raft + mTLS). The operator's
      backup policy (cadence, retention, offsite) is layered on top.
      "Regularly tested" is the operator's drill. (Backup integration
      tests at the [code] level are a coverage gap — backlog
      candidate for the open-pryv.io test suite.)
    detail: |
      **Encryption of the backup archive is operator-side by
      design.** `bin/backup.js` writes an unencrypted dump file;
      the operator wraps it with their at-rest encryption layer
      (LUKS / GPG / age / S3 SSE-KMS / Azure SSE / customer-
      managed keys) at the storage boundary. Same pattern as the
      bulk-event-data at-rest encryption posture (operator-side
      infrastructure layer is the deliberate choice; see
      `proposals/e2e-encryption.md`). A.8.13's "protected at the
      same security level as the source data" expectation is met
      by the operator's encryption pipeline, documented in the
      backup-policy SOP.

  - ref: A.8.15
    title: A.8.15 — Logging
    text: |
      Logs that record activities, exceptions, faults and other
      relevant events shall be produced, stored, protected and
      analysed.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [audit, audit-event-stream]
    tests: [AT01, AT02, AT03, AT51, AT52, AT53, AT61, AT65]
    planned:
      - kind: feature
        summary: "Chained / signed audit log adds the software-side tamper-resistance signal A.8.15 expects"
        proposal: proposals/audit-log-chaining.md
        backlog: AUDIT-LOG-CHAINING
        tracking_url: https://github.com/pryv/open-pryv.io/issues/74
        impact: low
    overview: |
      Per-user audit log captures every API method invocation; access
      reference (accessId + accessSerial) ties each row to the
      authenticated identity. Audit storage uses SQLite directly to
      decouple log integrity from data-path engine issues. The
      "analysed" element (review cadence, alerting thresholds) is the
      operator's procedure.
    detail: |
      "Stored, protected" caveat — the audit log is append-only by
      convention in the write path, but there is **no software-side
      tamper-resistance signal** (no hash chain, no per-row
      signature, no operator-signed checkpoint). Protection of the
      log rests on the operator's filesystem hardening: immutable
      mounts, append-only flags (`chattr +a`), file-integrity
      monitoring (AIDE / Tripwire), out-of-band SIEM forwarding to
      a WORM store.

      Future direction: chained / signed audit log (per-row prev_hash
      + periodic operator-signed checkpoints). Tracked under internal
      backlog slug `AUDIT-LOG-CHAINING` and
      `proposals/audit-log-chaining.md`. When shipped this row's
      coverage stays Implemented but the cited primitives will
      include `audit-chain`.

      Separate audit property worth flagging to the A.8.15 auditor:
      Pryv's audit log is data-minimal by construction — it captures
      action + source + URL query + access ref + integrity hash, but
      **never the request body**. The log itself therefore qualifies
      as well-scoped under the "logs that record activities" framing
      without storing the data being acted on. Caller-supplied search
      values (`events.get` content-query conditions on the GET path)
      do appear in the recorded URL query — see
      `context/content-query-audit-semantics.md`. See
      `docs/pryv-primitives.md` audit entry for the full capture
      catalogue.

      **Long-running deployment tiering**: for the "logs … stored,
      protected, analysed" portion of A.8.15 at multi-year scales,
      the audit log is exposed via the `@pryv/datastore`
      abstraction. Operators write a custom `auditStorage` engine
      plugin to tier hot recent rows + cold archived rows (e.g.,
      S3 Object Lock, Glacier) behind the same `audit.getLogs`
      API. No Pryv-shipped pruning primitive — pressure to prune
      is operational, not regulatory (HIPAA-style retention floors
      apply; there's no max-retention rule pushing destruction).
      Full pattern at
      `context/audit-archival-via-custom-datastore.md`.

  - ref: A.8.16
    title: A.8.16 — Monitoring activities
    text: |
      Networks, systems and applications shall be monitored for
      anomalous behaviour and appropriate actions taken to evaluate
      potential information security incidents.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [observability-provider, audit]
    overview: |
      The pluggable observability
      provider (New Relic adapter shipped) gives system-level
      monitoring; audit logs give application-level activity.
      Operator chooses provider + thresholds + escalation paths.
      Anomaly-detection logic on the audit stream itself is a
      potential extension.

  - ref: A.8.20
    title: A.8.20 — Networks security
    text: |
      Networks and network devices shall be secured, managed and
      controlled to protect information in systems and applications.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [letsEncrypt-integration, multi-core-mTLS]
    tests: [ACMEINT, ACMEORCH, CERTUTILS, FORCERENEWIPC, BUNDLEENC]
    overview: |
      TLS 1.3 in transit (built-in ACME integration with auto-renewal +
      cluster-replicated rotation); mTLS between cores in a multi-
      core cluster with a private cluster CA. No plaintext path
      shipped. Operator-side network controls (firewalls, network
      segmentation) sit on top.

  - ref: A.8.24
    title: A.8.24 — Use of cryptography
    text: |
      Rules for the effective use of cryptography, including
      cryptographic key management, shall be defined and implemented.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [letsEncrypt-integration, encryption-at-rest-secrets, multi-core-mTLS]
    config_keys: [letsEncrypt.atRestKey]
    tests: [ACMEINT, ATRENC, BUNDLEENC]
    planned:
      - kind: feature
        summary: "End-to-end encryption adds a customer-key flow (CMEK / BYOK) to the cryptography catalogue"
        proposal: proposals/e2e-encryption.md
        backlog: E2E-ENCRYPTION
        tracking_url: https://github.com/pryv/open-pryv.io/issues/34
        impact: low
    overview: |
      TLS 1.3 for transit, AES-256-GCM for at-rest operator secrets
      (HKDF-derived per-key with purpose labels), AES-256-GCM
      (scrypt-derived) for bootstrap bundle encryption. The operator's
      cryptography policy (key custody, rotation cadence, algorithm
      choice for engine-side at-rest encryption) is layered on top.

  - ref: A.8.25
    title: A.8.25 — Secure development lifecycle
    text: |
      Rules for the secure development of software and systems shall be
      established and applied.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: awareness
    draft: true
    pryv_primitives: [audit]
    overview: |
      Pryv's own SDLC is visible
      (public commit history, tagged releases, CHANGELOG-v2 +
      CHANGELOG-v2-back, multi-engine test matrix, dependency audit).
      For the implementer, this transparency feeds supplier-
      assessment artefacts. The implementer's own SDLC for their app
      + integrations remains their ISMS artefact.

  - ref: A.8.32
    title: A.8.32 — Change management
    text: |
      Changes to information processing facilities and information
      systems shall be subject to change-management procedures.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit]
    overview: |
      Pryv-side change-management
      evidence: tagged releases, Docker image SHA-pinning,
      CHANGELOG-v2 + CHANGELOG-v2-back per release, release-notes
      per Dokku deploy. The operator's change-management procedure
      (approvals, deployment windows, rollback plans) sits on top.
      The audit log gives the operational record of changes that
      touched data.

  - ref: A.8.34
    title: A.8.34 — Protection of information systems during audit testing
    text: |
      Audit tests and other assurance activities involving assessment
      of operational systems shall be planned and agreed between the
      tester and appropriate management.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit]
    overview: |
      Pen-tests, vulnerability
      scans, internal audits — all may generate elevated activity on
      the system. Pryv's audit log keeps the testing activity
      attributable (any test access surfaces with its accessId +
      accessSerial in the audit rows). The plan + agreement element
      is the operator's procedure.

  # ───────────────────────────────────────────────────────────────
  # Additional A.5 organizational + A.8 technological gaps
  # ───────────────────────────────────────────────────────────────

  - ref: A.5.10
    title: A.5.10 — Acceptable use of information and other associated assets
    text: |
      Rules for the acceptable use and procedures for handling
      information + associated assets shall be identified, documented
      and implemented.
    coverage: out-of-scope
    draft: true
    overview: |
      Acceptable-use policies are operator-side editorial artefacts
      (workforce code-of-conduct, asset handling rules). Pryv has no
      software role at the policy-content layer; the audit log
      supports after-the-fact enforcement evidence but doesn't
      author the rules.

  - ref: A.5.12
    title: A.5.12 — Classification of information
    text: |
      Information shall be classified according to the information
      security needs of the organization based on confidentiality,
      integrity, availability + relevant interested party requirements.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: primitive
    draft: true
    pryv_primitives: [stream, system-streams, event, data-types]
    overview: |
      Pryv supports
      classification by stream layout — dedicate subtrees per
      classification tier (e.g., `confidential/`, `restricted/`,
      `public/`) and gate them with distinct permission scopes.
      System streams add a privileged-data tier independent of the
      operator's classification scheme. The operator's classification
      scheme itself (tier labels, criteria, owner) is the policy
      artefact.

  - ref: A.5.13
    title: A.5.13 — Labelling of information
    text: |
      An appropriate set of procedures for information labelling shall
      be developed and implemented in accordance with the information
      classification scheme adopted by the organization.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: storage
    draft: true
    pryv_primitives: [event, clientData, stream]
    overview: |
      Labels on event-level data
      can ride on `event.clientData.classification` or on the parent
      stream's `clientData`; the canonical event-type schema
      (`data-types`) can be extended with a classification property
      when machine-readable labelling is needed downstream. Stream-
      level labels propagate to descendants by Pryv semantics.

  - ref: A.5.23
    title: A.5.23 — Information security for use of cloud services
    text: |
      Processes for acquisition, use, management and exit from cloud
      services shall be established in accordance with the
      organization's information security requirements.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [data-residency, encryption-at-rest-secrets, backup-restore]
    overview: |
      When the Pryv operator
      runs on a cloud provider (rather than on-premise), the cloud-
      service security posture is the operator's contractual concern.
      Pryv-side hooks that the operator's CSP-management process
      should use: data-residency configuration locks subjects to
      chosen regions; bootstrap bundle export gives a clean cloud-
      exit path (re-issue the cluster onto new infrastructure);
      operator-side at-rest encryption isolates the cloud provider
      from plaintext.

  - ref: A.6.3
    title: A.6.3 — Information security awareness, education and training
    text: |
      Personnel and relevant interested parties shall receive
      appropriate information security awareness, education and
      training and regular updates of the organization's information
      security policy + procedures.
    coverage: out-of-scope
    draft: true
    overview: |
      Training is an organizational programme. No software role at
      the training-content / training-delivery layer; the audit log
      lets you measure whether trained workforce actually applies
      trained patterns (a defensible "training effectiveness"
      artefact for the ISMS).

  - ref: A.8.7
    title: A.8.7 — Protection against malware
    text: |
      Protection against malware shall be implemented and supported by
      appropriate user awareness.
    coverage: out-of-scope
    draft: true
    overview: |
      Anti-malware is a host / endpoint / network-layer control —
      Pryv-the-software doesn't include AV or endpoint protection.
      The operator's hosting environment carries this (HDS Activity 1+2
      certified hosters typically inherit it from the CSP).

  - ref: A.8.8
    title: A.8.8 — Management of technical vulnerabilities
    text: |
      Information about technical vulnerabilities of information
      systems in use shall be obtained, the organization's exposure
      to such vulnerabilities shall be evaluated, and appropriate
      measures taken.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [observability-provider, audit]
    overview: |
      Pryv-side vulnerability
      management is upstream — public dependency-audit (npm audit
      pipeline, dependabot on open-pryv.io master), versioned
      CHANGELOG announcing relevant fixes, reproducible Docker image
      SHA. The operator's vulnerability-management cadence (when to
      upgrade, how to verify) sits on top. Observability data feeds
      incident-correlated vulnerability hunting.

  - ref: A.8.9
    title: A.8.9 — Configuration management
    text: |
      Configurations, including security configurations, of hardware,
      software, services and networks shall be established, documented,
      implemented, monitored and reviewed.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit]
    overview: |
      Pryv configuration lives in
      `default-config.yml` + `override-config.yml` + `host-config.yml`
      (operator-side); a `config-validation` step on master start
      fails fast on unresolved variables or missing required service
      fields, giving a baseline "configuration is well-formed" check.
      The operator's config-change procedure (versioning, approval,
      deployment) sits on top. Audit log shows when config-driven
      behaviour changed observably.

  - ref: A.8.11
    title: A.8.11 — Data masking
    text: |
      Data masking shall be used in accordance with the organization's
      topic-specific policy on access control + other related topic-
      specific policies, and business requirements, taking applicable
      legislation into consideration.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: primitive
    draft: true
    pryv_primitives: [stream, system-streams, event]
    planned:
      - kind: feature
        summary: "auth.randomAlias masks the real username at the access layer (row could move F:Primitive → Configurable)"
        proposal: proposals/aliases-as-pseudonymization-primitive.md
        backlog: ALIASES
        tracking_url: https://github.com/pryv/open-pryv.io/issues/38
        impact: medium
    overview: |
      Pryv enforces masking by **projection**, not transformation:
      stream-level isolation + permission-scoped access tokens hide
      whole sub-trees from a given role. The "rewrite a value before
      display" flavour of masking (e.g., `j***@example.com`) lives in
      the calling application — by design.
    detail: |
      The boundary is recorded in
      `context/data-masking-projection-vs-transformation.md`:
        - Stream-tree split + narrow access tokens = Pryv's
          projection-side contribution. Auditor-visible via the
          access permissions matrix.
        - Field-substring rewrites, hash-on-read, faker substitution,
          per-role redaction = application layer. Not Pryv's job by
          design (storage layer stays deterministic; "partially
          redacted" is not an API response).
        - Username-side pseudonymisation is the one transformation
          Pryv would do natively when `randomAlias` ships
          (`proposals/aliases-as-pseudonymization-primitive.md`).
        - Static masking for non-prod environments + field-level
          encryption at the schema layer are both implementer
          concerns today; end-to-end encryption
          (`proposals/e2e-encryption.md`) is the natural future
          primitive for both.
        - The audit log itself is data-minimal by construction —
          captures action + access + integrity hash, never the
          request body (see `docs/pryv-primitives.md` audit entry).

  - ref: A.8.12
    title: A.8.12 — Data leakage prevention
    text: |
      Data leakage prevention measures shall be applied to systems,
      networks and any other devices that process, store or transmit
      sensitive information.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: primitive
    draft: true
    pryv_primitives: [access, permissions, audit, observability-provider]
    overview: |
      Pryv's primary leakage-
      prevention surface is the permission model — an access only
      reads / writes the streams its scope permits, so a misconfigured
      app can't accidentally exfiltrate out-of-scope data. The audit
      log surfaces anomalous access patterns post-facto. Network /
      endpoint DLP (browser-side copy-paste protection, USB blocking,
      etc.) is the operator's endpoint-management scope.

  - ref: A.8.22
    title: A.8.22 — Segregation of networks
    text: |
      Groups of information services, users and information systems
      shall be segregated in the organization's networks.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [multi-core-mTLS]
    overview: |
      Multi-core Pryv
      clusters use mTLS over rqlite Raft for inter-core traffic, on
      a cluster-private CA distinct from the Let's Encrypt user-
      facing chain. This gives technical segregation between the
      cluster-internal control plane and the user-facing data plane.
      The operator's network segmentation (VPCs, security groups,
