      No software role; Pryv-side artefacts (audit, observability,
      this matrix) inform management-review meetings but don't
      substitute for leadership decisions.

  - ref: "9.1"
    title: Clause 9.1 — Monitoring, measurement, analysis and evaluation
    text: |
      The organization shall determine what needs to be monitored and
      measured; the methods for monitoring, measurement, analysis,
      and evaluation to ensure valid results; when monitoring shall
      be performed; who shall monitor; when results shall be analysed
      and evaluated; and who shall analyse + evaluate the results.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider]
    overview: |
      Pryv contributes the data:
      audit log (control-effectiveness sampling), observability
      metrics (operational + security KPIs). The monitoring programme
      structure (what / when / who) is operator-side.

  - ref: "9.2"
    title: Clause 9.2 — Internal audit
    text: |
      The organization shall conduct internal audits at planned
      intervals to provide information on whether the ISMS conforms
      to the organization's own requirements + this document's
      requirements and is effectively implemented + maintained.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit]
    overview: |
      Internal-audit programme is
      operator-side. Pryv-side artefacts that internal auditors
      typically review: the audit log itself (control-effectiveness
      sample), this compliance matrix (control inventory),
      open-pryv.io release-process evidence (CHANGELOGs, tagged
      releases, test matrix).

  - ref: "10.1"
    title: Clause 10.1 — Continual improvement
    text: |
      The organization shall continually improve the suitability,
      adequacy and effectiveness of the ISMS.
    coverage: out-of-scope
    draft: true
    overview: |
      Continual improvement is a programmatic operator activity.
      Pryv-side improvements arrive via upstream open-pryv.io releases
      (which the operator integrates), but the organization's ISMS
      improvement programme is theirs.

  - ref: "10.2"
    title: Clause 10.2 — Nonconformity and corrective action
    text: |
      When a nonconformity occurs, the organization shall react to
      the nonconformity + take action to control + correct it;
      evaluate the need for action to eliminate the causes; implement
      action needed; review effectiveness; make changes to the ISMS
      if necessary.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: storage
    draft: true
    pryv_primitives: [event, stream, audit]
    overview: |
      CAPA records can ride on
      Pryv events on a `compliance/capa/*` stream with attachments;
      the audit chain provides tamper evidence. The CAPA workflow
      itself (root-cause analysis, effectiveness verification,
      ISMS-change decisions) is operator-side.

