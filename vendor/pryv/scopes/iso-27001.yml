  - ref: A.5.6
    title: A.5.6 — Contact with special interest groups
    text: |
      The organization shall establish and maintain contact with
      special interest groups, security forums and professional
      associations.
    coverage: out-of-scope
    draft: true
    overview: |
      Industry-engagement programme is operator-side.

  - ref: A.5.8
    title: A.5.8 — Information security in project management
    text: |
      Information security shall be integrated into project management.
    coverage: out-of-scope
    draft: true
    overview: |
      Project-management methodology is operator-side. Pryv-side
      project artefacts (this matrix, public open-pryv.io plans + GH
      Projects board for new features) demonstrate ISMS integration
      on the upstream side.

  - ref: A.5.9
    title: A.5.9 — Inventory of information and other associated assets
    text: |
      An inventory of information and other associated assets,
      including owners, shall be developed and maintained.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: primitive
    draft: true
    pryv_primitives: [stream, event, audit]
    derives_from: [iso-27001.A.5.12]
    overview: |
      Pryv's stream + event
      model gives a queryable inventory of all data assets stored in
      the deployment (the data subject is implicitly the asset owner
      under Art. 4 GDPR personhood). Operator's broader infrastructure
      inventory (servers, databases, logs, code repositories) is
      layered on top.

  - ref: A.5.11
    title: A.5.11 — Return of assets
    text: |
      Personnel + other interested parties shall return all the
      organization's assets in their possession upon change or
      termination of their employment, contract or agreement.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: primitive
    draft: true
    pryv_primitives: [access, audit]
    derives_from: [iso-27001.A.6.5, hipaa-security.164.308(a)(3)(ii)(C)]
    overview: |
      For the technical
      "asset" of an access token, return = revocation
      (`accesses.delete`). For physical / off-line assets, return is
      operator-side. The audit log captures the technical-side
      return.

  - ref: A.5.21
    title: A.5.21 — Managing information security in the ICT supply chain
    text: |
      Processes and procedures shall be defined and implemented to
      manage the information-security risks associated with the ICT
      products and services supply chain.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: awareness
    draft: true
    pryv_primitives: [audit]
    derives_from: [iso-27001.A.5.19, iso-27001.A.8.30]
    planned:
      - kind: feature
        summary: "Three-phase supply-chain scanning pipeline (CI npm audit gate + SBOM via Syft + image scan via Grype + cosign signing); shifts row F:Awareness Low → F:Evidence Medium when shipped"
        proposal: proposals/supply-chain-scanning-pipeline.md
        backlog: SUPPLY-CHAIN-SCANNING-PIPELINE
        tracking_url: https://github.com/pryv/open-pryv.io/issues/81
        impact: medium
    overview: |
      Supply-chain risk at the Pryv layer today is **partial and
      passive**: `package-lock.json` committed, CI uses
      `npm install --ignore-scripts`, per-commit Docker SHA tag
      pushed alongside the moving `:2.0.0-pre` tag, rqlite version
      pinned via Dockerfile `ARG` (no checksum verification yet),
      GitHub Dependabot security alerts surface CVEs via the repo's
      Security tab (a 2026-04-30 sweep cleared 22 alerts → 0).
      What's **not** in place: CI gate on `npm audit`,
      SCA tool integration, container image scanning (Trivy /
      Grype), base image digest pinning, SBOM emission (CycloneDX /
      SPDX), image signing (cosign / SLSA attestation), rqlite
      tarball `sha256sum -c`. See
      `proposals/supply-chain-scanning-pipeline.md` for the
      three-phase plan that closes the gap. The operator's broader
      ICT supply-chain programme (vendor assessment, SLA reviews,
      contract clauses) sits on top.

  - ref: A.5.24
    title: A.5.24 — Information security incident management planning and preparation
    text: |
      The organization shall plan and prepare for managing information
      security incidents by defining, establishing and communicating
      information security incident management processes, roles and
      responsibilities.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider, access]
    derives_from: [hipaa-security.164.308(a)(6)(i), diga.A1.2.6]
    planned:
      - kind: feature
        summary: "Chained audit log strengthens forensic evidence (row could shift F:Evidence|Med → F:Evidence|High)"
        proposal: proposals/audit-log-chaining.md
        backlog: AUDIT-LOG-CHAINING
        tracking_url: https://github.com/pryv/open-pryv.io/issues/74
        impact: medium
      - kind: enhancement
        summary: "Published vulnerability disclosure program supplies the externally-facing intake channel for substrate-vulnerability reports into the incident-management plan"
        proposal: proposals/vulnerability-disclosure-program.md
        backlog: VULNERABILITY-DISCLOSURE-PROGRAM
        tracking_url: https://github.com/pryv/open-pryv.io/issues/84
        impact: low
    overview: |
      Pryv contributes detection
      + scoping data (audit + observability) + containment primitive
      (accesses.delete) + substrate-vulnerability intake channel
      (backlog `VULNERABILITY-DISCLOSURE-PROGRAM` modernises
      today's bare SECURITY.md into a GHSA-based private flow
      with SLA + scope + safe harbor). The incident-management
      plan itself (roles, escalation, communications, lessons-
      learned) is operator-side.

  - ref: A.5.25
    title: A.5.25 — Assessment and decision on information security events
    text: |
      The organization shall assess information security events and
      decide if they are to be categorized as information security
      incidents.
    coverage: facilitated
    pryv_effort_saved: low
    facilitation_mode: evidence
    draft: true
    pryv_primitives: [audit, observability-provider]
    derives_from: [iso-27001.A.5.24]
    overview: |
      Event-vs-incident
      classification is operator decision. Pryv-side data (audit row
      patterns, observability anomalies) feeds the assessment but the
      categorization rule is operator policy.

  - ref: A.5.30
    title: A.5.30 — ICT readiness for business continuity
    text: |
      ICT readiness shall be planned, implemented, maintained and
      tested based on business continuity objectives and ICT
      continuity requirements.
    coverage: facilitated
    pryv_effort_saved: medium
    facilitation_mode: infrastructure
