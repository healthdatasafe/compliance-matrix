    overview: |
      For the operator running
      Pryv as one of its applications, this compliance matrix IS the
      catalogue of identified + specified + approved security
      requirements Pryv satisfies. For the operator's own applications
      built on Pryv, the requirements are their editorial work.

  - ref: A.8.27
    title: A.8.27 — Secure system architecture and engineering principles
    text: |
      Principles for engineering secure systems shall be established,
      documented, maintained and applied to any information systems
      development activities.
    coverage: facilitated
    pryv_effort_saved: high
    facilitation_mode: infrastructure
    draft: true
    pryv_primitives: [access, permissions, system-streams, encryption-at-rest-secrets]
    derives_from: [iso-27001.A.8.25, iso-27001.A.8.28]
    overview: |
      Pryv's architecture is
      informed by secure-by-design principles (per-user isolation,
      least-privilege permissions, encryption-by-default in transit,
      system-stream privilege separation). The operator's own
      engineering team applies the same principles to app-layer code.
      Pryv-side architecture documentation lives in public
      open-pryv.io README + this matrix.

  - ref: A.8.29
    title: A.8.29 — Security testing in development and acceptance
    text: |
      Security testing processes shall be defined and implemented in
