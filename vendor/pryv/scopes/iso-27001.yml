  - ref: A.5.16
    title: A.5.16 — Identity management
    text: |
      The full life cycle of identities shall be managed.
    coverage: implemented
    pryv_effort_saved: high
    draft: true
    pryv_primitives: [access, system-streams, audit]
    derives_from: [iso-27001.A.5.15, hipaa-security.164.308(a)(4)(ii)(C)]
    tests: [AA01, AA02, ACCP, UZEV]
    overview: |
      Pryv's account + access primitives implement the full identity
      lifecycle: create (registration), enable (login + access mint),
      modify (accesses.update, account.update), suspend (access
      narrowing), terminate (accesses.delete + system.users.delete).
      Audit log gives the per-stage evidence. The naming + assignment
      policy is the operator's.
    detail: |
      For workforce / role-scale deployments, Pryv composes with an
      external IdP / IGA system via two patterns documented in
      `context/workforce-access-patterns.md` — (1) group access +
      `callerId` audit suffix, (2) seed access + sub-access
      derivation. **Roles + groups themselves are deliberately
      outside Pryv;** the IdP is the source of truth for identity
      lifecycle, and Pryv records the resulting access state +
      per-individual audit trail.

  - ref: A.5.17
